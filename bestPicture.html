<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Best Picture</title>
    <link rel="stylesheet" href="movies.css">
    <script src="script.js" defer></script>
</head>
<body>
  <div id="star-container"></div>
  <header>
    <div class="oscarTitle">
      <img id="oscar" src="./pictures/oscar-statuette.png" alt="Academy Award statuette">
      <h1><a href="index.html" id="homeButton">Oscars 2026</a></h1>
    </div>
    <div class="navMenu">
      <div>
        <button onclick="bestPicturePressed()">Best Picture Nominees</button>
      </div>
      <div>
        <button onclick="winnersPressed()">Winners</button>
      </div>
      <div>
        <button onclick="redCarpetPressed()">The Red Carpet</button>
      </div>
    </div>
  </header>
  <div id="main-content" class="content-wrapper">
    <div class="movies">
      <figure>
        <div class="figure-header">
          <h2>Bugonia</h2>
          <a href="https://www.imdb.com/title/tt12300742/?ref_=ls_t_9">★ 7.4</a>
        </div>
        <img src="./pictures/bestpicture/Bugonia.webp" alt="Emma Stone covered in white paint and shaved head in Bugonia">
        <figcaption>
          Two conspiracy-obsessed young men kidnap the high-powered CEO of a major company, convinced that she is an alien intent on destroying planet Earth.
        </figcaption>
      </figure>
      <figure>
        <div class="figure-header">
          <h2>F1: The Movie</h2>
          <a href="https://www.imdb.com/title/tt16311594/?ref_=ls_t_5">★ 7.6</a>
        </div>
        <img src="./pictures/bestpicture/F1.webp" alt="Brad Pitt in a white racing suit standing on a racetrack full of people in F1">
        <figcaption>
          A Formula One driver comes out of retirement to mentor and team up with a younger driver.
        </figcaption>
      </figure>
      <figure>
        <div class="figure-header">
          <h2>Frankenstein</h2>
          <a href="https://www.imdb.com/title/tt1312221/?ref_=ls_t_3">★ 7.4</a>
        </div>
        <img src="./pictures/bestpicture/Frankenstein.webp" alt="Jacob Elordi as Frankenstein's monster with a fur coat on">
        <figcaption>
          Dr. Victor Frankenstein, a brilliant but egotistical scientist, brings a creature to life in a monstrous experiment that ultimately leads
           to the undoing of both the creator and his tragic creation.
        </figcaption>
      </figure>
      <figure>
        <div class="figure-header">
          <h2>Hamnet</h2>
          <a href="https://www.imdb.com/title/tt14905854/?ref_=ls_t_4">★ 7.4</a>
        </div>
        <img src="./pictures/bestpicture/Hamnet.webp" alt="Jessie Buckley at the Globe theater in the front row with a crowd">
        <figcaption>
          In late 16th-century England, Agnes, a healer sensitive to the world around her, builds a home with William, a local tutor and aspiring playwright. 
          As their lives fracture, they are tested by distance, silence, and grief.
        </figcaption>
      </figure>
      <figure>
        <div class="figure-header">
          <h2>Marty Supreme</h2>
          <a href="https://www.imdb.com/title/tt32916440/?ref_=ls_t_6">★ 7.8</a>
        </div>
        <img src="./pictures/bestpicture/Marty-Supreme.webp" alt="Thimothée Chalamet standing in a crowd with a raised American flag ping pong paddle">
        <figcaption>
          Marty Mauser, a young man with a dream no one respects, goes to hell and back in pursuit of greatness.
        </figcaption>
      </figure>
      <figure>
        <div class="figure-header" id="winner">
          <span class="badge">WINNER</span>
          <h2>One Battle After Another</h2>
          <a href="https://www.imdb.com/title/tt30144839/?ref_=ls_t_1">★ 7.7</a>
        </div>
        <img src="./pictures/bestpicture/One-Battle-After-Another.webp" alt="Benicio Del Toro with his hands up on a road with a police car behind him">
        <figcaption>
          When their enemy resurfaces after 16 years, a group of ex-revolutionaries reunite to rescue the daughter of one of their own.
        </figcaption>
      </figure>
      <figure>
        <div class="figure-header">
          <h2>Sentimental Value</h2>
          <a href="https://www.imdb.com/title/tt12300742/?ref_=ls_t_10">★ 7.8</a>
        </div>
        <img src="./pictures/bestpicture/Sentimental-Value.webp" alt="Renate Reinsve and Stellan Skarsgard on a beach wearing formal clothes">
        <figcaption>
          An intimate exploration of family, memories, and the reconciliatory power of art.
        </figcaption>
      </figure>
      <figure>
       <div class="figure-header">
          <h2>Sinners</h2>
          <a href="https://www.imdb.com/title/tt12300742/?ref_=ls_t_2">★ 7.5</a>
        </div>
        <img src="./pictures/bestpicture/Sinners.webp" alt="Michael B. Jordan and Jack O'Connell staring at a fire burning off screen">
        <figcaption>
          Trying to leave their troubled lives behind, twin brothers return to their hometown to start again, only to discover that an even 
          greater evil is waiting to welcome them back.
        </figcaption>
      </figure>
      <figure>
        <div class="figure-header">
          <h2>The Secret Agent</h2>
          <a href="https://www.imdb.com/title/tt12300742/?ref_=ls_t_8">★ 7.2</a>
        </div>
        <img src="./pictures/bestpicture/The-Secret-Agent.webp" alt="Robson Andrade leaning on a pole next to a yellow car">
        <figcaption>
          In 1977, a technology expert flees from a mysterious past and returns to his hometown of Recife in search of peace. 
          He soon realizes that the city is far from being the refuge he seeks.
        </figcaption>
      </figure>
      <figure>
        <div class="figure-header">
          <h2>Train Dreams</h2>
          <a href="https://www.imdb.com/title/tt12300742/?ref_=ls_t_7">★ 7.5</a>
        </div>
        <img src="./pictures/bestpicture/Train-Dreams.webp" alt="Joel Edgerton leaning the open door of a boxcar on a moving train">
        <figcaption>
          Based on Denis Johnson's beloved novella, Train Dreams is the moving portrait of Robert Grainier, 
          a logger and railroad worker who leads a life of unexpected depth and beauty in the rapidly-changing America of the early 20th Century.
        </figcaption>
      </figure>
    </div>
  </div>
  <footer class="content-wrapper">
    <p>&copy; 2026 Oscars Fan Page | Not affiliated with the Academy</p>
  </footer>
</body>
</html>
